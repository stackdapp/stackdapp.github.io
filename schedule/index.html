<style>
:root{
  --bg:#141210;
  --bg2:#1c1916;
  --panel:#211e1a;
  --panel2:#272320;
  --border:#2e2a25;
  --border2:#252118;
  --txt:#f0ebe4;
  --txt2:#b8b0a6;
  --txt3:#7a7168;
  --txt4:#4a4540;
  --accent:#0D9488;
  --accent2:#14b8a6;
  --xp:#f0a500;
  --xp2:#ffc840;
  --xp-dim:rgba(240,165,0,.12);
  --xp-glow:rgba(240,165,0,.3);
  --accent-dim:rgba(13,148,136,.12);
  --accent-dim2:rgba(13,148,136,.07);
  --grn:#4ade80;
  --grn-dim:rgba(74,222,128,.09);
  --grn-border:rgba(74,222,128,.22);
  --red:#f87171;
  --red-dim:rgba(248,113,113,.09);
  --red-border:rgba(248,113,113,.22);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 16px rgba(0,0,0,.4),0 2px 4px rgba(0,0,0,.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --radius:14px;
  --radius-sm:10px;
  --radius-xs:7px;

  --cat-wake:#fb923c;
  --cat-school:#14b8a6;
  --cat-meal:#34d399;
  --cat-chore:#f0a500;
  --cat-free:#60a5fa;
  --cat-bed:#94a3b8;
  --cat-bath:#22d3ee;
  --cat-xbox:#f472b6;
}

/* -- LIGHT THEME -- */
[data-theme="light"]{
  --bg:#f5f0e8;
  --bg2:#fdf9f3;
  --panel:#ffffff;
  --panel2:#f9f5ee;
  --border:#e4ddd0;
  --border2:#ede8df;
  --txt:#1a1714;
  --txt2:#6b6156;
  --txt3:#9e9488;
  --txt4:#c4bdb4;
  --accent:#0f766e;
  --accent2:#0D9488;
  --xp:#d4860a;
  --xp2:#e8970c;
  --xp-dim:rgba(212,134,10,.1);
  --xp-glow:rgba(212,134,10,.25);
  --accent-dim:rgba(15,118,110,.1);
  --accent-dim2:rgba(15,118,110,.06);
  --grn:#16a34a;
  --grn-dim:rgba(22,163,74,.08);
  --grn-border:rgba(22,163,74,.2);
  --red:#dc2626;
  --red-dim:rgba(220,38,38,.07);
  --red-border:rgba(220,38,38,.2);
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --cat-school:#0D9488;
  --cat-meal:#059669;
  --cat-chore:#f0a500;
  --cat-free:#0D9488;
  --cat-bed:#64748b;
}

/* -- AUTO: follow system preference unless manually overridden -- */
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f5f0e8;
    --bg2:#fdf9f3;
    --panel:#ffffff;
    --panel2:#f9f5ee;
    --border:#e4ddd0;
    --border2:#ede8df;
    --txt:#1a1714;
    --txt2:#6b6156;
    --txt3:#9e9488;
    --txt4:#c4bdb4;
    --accent:#0284c7;
    --accent2:#14b8a6;
    --xp:#d4860a;
    --xp2:#e8970c;
    --xp-dim:rgba(212,134,10,.1);
    --xp-glow:rgba(212,134,10,.25);
    --accent-dim:rgba(2,132,199,.1);
    --accent-dim2:rgba(2,132,199,.06);
    --grn:#16a34a;
    --grn-dim:rgba(22,163,74,.08);
    --grn-border:rgba(22,163,74,.2);
    --red:#dc2626;
    --red-dim:rgba(220,38,38,.07);
    --red-border:rgba(220,38,38,.2);
    --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 16px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
    --shadow-lg:0 8px 32px rgba(0,0,0,.14);
    --cat-school:#0D9488;
    --cat-meal:#059669;
    --cat-chore:#f0a500;
    --cat-free:#0D9488;
    --cat-bed:#64748b;
  }
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Sora',sans-serif;color:var(--txt);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}

/* -- SPLASH -- */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9990;padding-top:env(safe-area-inset-top);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px;pointer-events:none;}
.sp-logo{display:flex;align-items:center;gap:12px;opacity:0;animation:fadeUp .5s .1s ease forwards;}
.sp-s{width:48px;height:48px;background:var(--accent);border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:#fff;
  box-shadow:0 0 24px rgba(13,148,136,.35);}
.sp-wordmark{font-size:30px;font-weight:800;color:var(--txt);letter-spacing:-1px;}
.sp-sub{font-size:13px;color:var(--txt3);font-weight:400;letter-spacing:.3px;
  opacity:0;animation:fadeUp .4s .3s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.boot-log{width:100%;max-width:320px;opacity:0;animation:fadeUp .3s .5s ease forwards;
  display:flex;flex-direction:column;gap:10px;}
.boot-item{display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .2s;}
.boot-dot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .3s;}
.boot-item.active .boot-dot{background:var(--accent);animation:dotPulse .8s ease-in-out infinite;}
.boot-item.ok .boot-dot{background:var(--grn);}
@keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.boot-txt{font-size:12px;color:var(--txt3);font-weight:400;}
.boot-item.ok .boot-txt{color:var(--txt2);}
.sp-bar-wrap{width:100%;max-width:320px;opacity:0;animation:fadeUp .3s .5s ease forwards;}
.sp-bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-bottom:8px;font-weight:500;}
.sp-bar-lbl span{color:var(--xp);}
.sp-bar-track{height:2px;background:var(--border);border-radius:1px;}
.sp-bar-fill{height:100%;background:var(--xp);border-radius:1px;width:0%;transition:width .2s linear;
  box-shadow:0 0 8px var(--xp-glow);}
.sp-out{animation:spOut .4s ease forwards!important;pointer-events:none;}
@keyframes spOut{to{opacity:0;pointer-events:none;}}

/* -- APP -- */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;opacity:0;transition:opacity .3s;}
#app.ready{opacity:1;}


/* Safe area handling */
#safe-top{
  height:env(safe-area-inset-top);
  min-height:env(safe-area-inset-top);
  background:var(--bg2);
  flex-shrink:0;
}
@supports not (height: env(safe-area-inset-top)){
  #safe-top{height:0;min-height:0;}
}


  .content{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch;touch-action:pan-y;}
  #safe-top{height:env(safe-area-inset-top);min-height:env(safe-area-inset-top);}
}

.navbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
/* -- TOPBAR -- */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  min-height:56px;}
.tb-l{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden;}
.tb-s{width:30px;height:30px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.tb-info{display:flex;flex-direction:column;min-width:0;}
.tb-title{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.4px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sub{font-size:10px;color:var(--txt3);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-r{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.live-chip{font-size:10px;color:var(--grn);font-weight:600;
  background:var(--grn-dim);border:1px solid var(--grn-border);
  padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.live-dot{width:5px;height:5px;background:var(--grn);border-radius:50%;box-shadow:0 0 6px var(--grn);}
.blink{animation:blink 1.4s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.tb-clock-wrap{text-align:right;flex-shrink:0;}
.tb-clk{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;color:var(--txt);letter-spacing:.5px;}
.tb-dt{font-size:10px;color:var(--txt3);margin-top:1px;}

/* -- MAIN -- */
.main-layout{flex:1;overflow:hidden;position:relative;}
.content{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch;touch-action:pan-y;}
.screen{display:none;padding:16px 16px 72px;box-sizing:border-box;touch-action:pan-y;}.screen.active{display:block;}

/* -- NAVBAR -- */
.nb{flex:1;padding:8px 2px;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--txt4);font-family:'Sora',sans-serif;font-size:9px;font-weight:600;letter-spacing:.2px;border-top:2px solid transparent;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nb:hover{color:var(--txt2);}
.nb.active{color:var(--accent);border-top-color:var(--accent);}
.nb.school-active{color:var(--cat-school);border-top-color:var(--cat-school);}
.nb-icon{font-size:15px;line-height:1;}

/* -- PANEL -- */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.ph{font-size:10px;font-weight:700;color:var(--txt3);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;letter-spacing:.8px;text-transform:uppercase;}
.ph-line{flex:1;height:1px;background:var(--border);}
.ph-count{color:var(--txt4);font-size:10px;font-weight:500;letter-spacing:0;}
.ph.violet{color:var(--cat-school);}

/* -- BUTTONS -- */
.btn{border:none;border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;
  font-family:'Sora',sans-serif;font-size:14px;font-weight:700;width:100%;
  text-align:center;transition:all .15s;margin-top:10px;letter-spacing:-.1px;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(13,148,136,.25);}
.btn-primary:hover{background:var(--accent2);}
.btn-primary:active{transform:scale(.98);}
.btn-school{background:var(--cat-school);color:#fff;box-shadow:0 0 20px rgba(20,184,166,.2);}
.btn-school:hover{filter:brightness(1.1);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--txt3);
  font-size:13px;font-weight:500;}
.btn-ghost:hover{border-color:var(--txt4);color:var(--txt2);}
.btn-danger{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);font-size:13px;font-weight:600;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* -- BRIEF -- */
.brief-grid{display:flex;flex-direction:column;gap:12px;}

.greeting-card{border-radius:var(--radius);padding:22px 20px;
  background:linear-gradient(135deg,var(--accent-dim) 0%,var(--panel) 60%,var(--panel2) 100%);
  border:1px solid rgba(13,148,136,.2);position:relative;overflow:hidden;box-shadow:var(--shadow);}
[data-theme="light"] .greeting-card,
@media(prefers-color-scheme:light){:root:not([data-theme="dark"]) .greeting-card{
  border-color:rgba(2,132,199,.2);
}}
.greeting-card::before{content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(13,148,136,.12) 0%,transparent 70%);}
.g-eyebrow{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:7px;opacity:.8;}
.g-name{font-size:26px;font-weight:800;color:var(--txt);letter-spacing:-.6px;line-height:1.2;}
.g-level{font-size:12px;color:var(--txt2);margin-top:6px;font-weight:500;}
.g-level span{color:var(--accent);font-weight:700;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;box-shadow:var(--shadow);}
.stat-box-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:8px;}
.stat-box-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;color:var(--txt);line-height:1;}
.stat-box-val sup{font-size:11px;color:var(--txt2);}
.stat-box-sub{font-size:11px;color:var(--txt3);margin-top:3px;}
.stat-box-cells{display:flex;gap:5px;margin-top:8px;}
.stat-cell{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-xs);
  padding:5px 4px;flex:1;text-align:center;}
.sc-lbl{font-size:8px;color:var(--txt4);font-weight:600;margin-bottom:2px;
  text-transform:uppercase;letter-spacing:.4px;}
.sc-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--txt2);}

.level-row{display:flex;align-items:center;gap:10px;margin-top:4px;}
.level-badge{width:40px;height:40px;background:var(--accent-dim);border:1px solid rgba(13,148,136,.25);
  border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.level-abbr{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--accent);}
.level-info{flex:1;min-width:0;}
.level-name{font-size:13px;font-weight:700;color:var(--txt);}
.level-track{height:4px;background:var(--border2);border-radius:2px;margin:5px 0 3px;}
.level-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .6s;
  box-shadow:0 0 8px rgba(13,148,136,.4);}
.level-xp{font-size:10px;color:var(--txt3);}
.level-xp span{color:var(--txt2);font-weight:600;}

.block-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.block-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--accent),rgba(13,148,136,.3));border-radius:3px 0 0 3px;}
.bc-eyebrow{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:6px;margin-left:10px;}
.bc-name{font-size:20px;font-weight:700;color:var(--txt);letter-spacing:-.4px;margin-left:10px;}
.bc-timer{font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:500;color:var(--accent);
  letter-spacing:2px;line-height:1;margin:10px 0 4px 10px;
  text-shadow:0 0 20px rgba(13,148,136,.3);}
.bc-lbl{font-size:10px;color:var(--txt3);font-weight:500;text-transform:uppercase;
  letter-spacing:.4px;margin-left:10px;}
.bc-prog-track{height:2px;background:var(--border2);border-radius:1px;margin:12px 0 0;}
.bc-prog-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 1s linear;}
.bc-next{font-size:12px;color:var(--txt3);margin-top:9px;margin-left:10px;}
.bc-next span{color:var(--accent);font-weight:600;}

.upcoming-list{display:flex;flex-direction:column;gap:4px;}
.up-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--panel2);border:1px solid var(--border2);border-radius:var(--radius-xs);}
.up-item.now{background:var(--accent-dim);border-color:rgba(13,148,136,.25);}
.up-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.up-lbl{font-size:13px;font-weight:500;color:var(--txt2);flex:1;}
.up-item.now .up-lbl{color:var(--txt);font-weight:600;}
.up-time{font-size:11px;color:var(--txt3);font-family:'JetBrains Mono',monospace;}
.up-item.now .up-time{color:var(--accent);}
.now-tag{font-size:9px;font-weight:700;background:var(--accent);color:#fff;
  padding:2px 8px;border-radius:10px;letter-spacing:.3px;flex-shrink:0;}

/* -- SCHEDULE SCREEN -- */
.block-group{margin-bottom:8px;}
.bg-hdr{display:flex;align-items:center;gap:10px;padding:11px 13px;
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);
  border-left:3px solid var(--border);}
.bg-hdr-name{font-size:14px;font-weight:600;color:var(--txt);flex:1;}
.bg-hdr-time{font-size:11px;color:var(--txt3);font-family:'JetBrains Mono',monospace;}
.now-badge{font-size:9px;font-weight:700;background:var(--accent);color:#fff;
  padding:2px 8px;border-radius:10px;letter-spacing:.3px;flex-shrink:0;}
.bg-items{display:flex;flex-direction:column;gap:3px;padding:4px 0 2px 14px;}
.act-row{display:flex;align-items:center;gap:8px;padding:8px 11px;
  background:var(--panel2);border:1px solid var(--border2);border-radius:var(--radius-xs);
  border-left:3px solid transparent;}
.act-row.done{opacity:.35;}
.ar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ar-lbl{font-size:12px;font-weight:500;color:var(--txt2);flex:1;}
.act-row.cur .ar-lbl{color:var(--txt);font-weight:600;}
.ar-time{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono',monospace;}

/* -- SCHOOL -- */
.school-layout{display:grid;grid-template-columns:1fr 290px;gap:14px;}
.school-hero{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.school-hero::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--cat-school),rgba(20,184,166,.2));border-radius:3px 0 0 3px;}
.sh-eye{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px;}
.sh-pulse{width:5px;height:5px;background:var(--cat-school);border-radius:50%;
  animation:pulse 2s ease-in-out infinite;flex-shrink:0;box-shadow:0 0 6px var(--cat-school);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.sh-subject{font-size:22px;font-weight:700;color:var(--txt);letter-spacing:-.4px;margin-bottom:4px;}
.sh-desc{font-size:11px;color:var(--txt3);margin-bottom:18px;min-height:14px;font-weight:500;}
.sh-timer{font-family:'JetBrains Mono',monospace;font-size:68px;font-weight:500;
  color:var(--cat-school);letter-spacing:2px;line-height:1;
  text-shadow:0 0 24px rgba(20,184,166,.3);}
.sh-timer.warn{color:var(--red);text-shadow:0 0 24px rgba(248,113,113,.3);
  animation:timerWarn .5s ease-in-out infinite alternate;}
@keyframes timerWarn{from{opacity:1;}to{opacity:.4;}}
.sh-timer-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;
  margin-top:5px;font-weight:600;}
.sh-track{height:3px;background:var(--border2);border-radius:2px;margin:16px 0 0;}
.sh-fill{height:100%;background:var(--cat-school);border-radius:2px;transition:width 1s linear;}
.sh-fill.warn{background:var(--red);}
.sh-link{margin-top:12px;}
.sh-link a{font-size:11px;color:var(--cat-school);font-weight:600;text-decoration:none;}
.school-up-next{margin-top:12px;padding:12px;background:var(--panel2);
  border:1px solid var(--border);border-radius:var(--radius-sm);}
.un-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.un-name{font-size:14px;font-weight:600;color:var(--txt);}
.un-dur{font-size:11px;color:var(--txt3);margin-top:2px;}
.school-xp-bar{background:var(--panel2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;margin-top:12px;}
.sxp-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.sxp-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:500;color:var(--cat-school);line-height:1;}
.sxp-max{font-size:10px;color:var(--txt3);margin-top:2px;}
.sxp-track{height:3px;background:var(--border2);border-radius:2px;margin:8px 0 0;}
.sxp-fill{height:100%;background:var(--cat-school);border-radius:2px;transition:width .5s;}
.lesson-item{display:flex;align-items:center;gap:8px;padding:9px 11px;
  background:var(--panel2);border:1px solid var(--border2);border-radius:var(--radius-xs);
  border-left:3px solid transparent;margin-bottom:4px;}
.lesson-item.current{background:rgba(20,184,166,.08);border-color:rgba(20,184,166,.3);
  border-left-color:var(--cat-school);}
.lesson-item.done{opacity:.3;}
.li-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt4);width:16px;text-align:center;flex-shrink:0;}
.lesson-item.current .li-num{color:var(--cat-school);}
.li-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.li-name{font-size:12px;font-weight:500;color:var(--txt2);flex:1;}
.lesson-item.current .li-name{color:var(--txt);font-weight:600;}
.li-dur{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.li-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0;letter-spacing:.2px;}
.li-now{background:var(--cat-school);color:#fff;}
.li-done-tag{background:var(--grn-dim);border:1px solid var(--grn-border);color:var(--grn);}

.school-idle{text-align:center;padding:60px 20px;}
.si-icon{font-size:52px;margin-bottom:18px;}
.si-title{font-size:26px;font-weight:800;color:var(--txt);letter-spacing:-.5px;margin-bottom:8px;}
.si-sub{font-size:14px;color:var(--txt2);margin-bottom:32px;font-weight:500;}
.school-complete{text-align:center;padding:50px 20px;}
.sc-score-big{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:500;
  color:var(--grn);line-height:1;text-shadow:0 0 30px rgba(74,222,128,.25);}
.sc-lbl-big{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.8px;margin-top:8px;}
.sc-msg{font-size:14px;color:var(--txt2);margin:16px 0 28px;line-height:1.7;}

#school-noday{text-align:center;padding:60px 20px;}
.noday-icon{font-size:56px;margin-bottom:18px;}
.noday-title{font-size:24px;font-weight:800;color:var(--txt);letter-spacing:-.4px;margin-bottom:10px;}
.noday-msg{font-size:14px;color:var(--txt2);margin-bottom:8px;line-height:1.7;}
.noday-day{font-size:11px;color:var(--txt4);font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;margin-top:20px;}

/* -- XP HERO -- */
.xp-hero{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;text-align:center;margin-bottom:12px;box-shadow:var(--shadow);}
.xp-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:5px;}
.xp-val{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:500;color:var(--xp);
  line-height:1;text-shadow:0 0 16px var(--xp-dim);}
.xp-max{font-size:11px;color:var(--txt3);margin-top:3px;}
.xp-bar-track{height:3px;background:var(--border2);border-radius:2px;margin:11px 0 3px;}
.xp-bar-fill{height:100%;background:var(--xp);border-radius:2px;transition:width .4s;}

/* -- TASKS -- */
.task-item{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;
  border-left:3px solid var(--border);margin-bottom:6px;transition:all .15s;box-shadow:var(--shadow);}
.task-item:hover:not(.done){background:var(--panel2);border-color:var(--accent);
  border-left-color:var(--accent);transform:translateX(2px);}
.task-item.done{opacity:.4;}
.task-item.done .ti-lbl{text-decoration:line-through;color:var(--txt3);}
.ti-check{width:20px;height:20px;border:2px solid var(--border);background:var(--bg2);
  border-radius:6px;flex-shrink:0;position:relative;transition:all .15s;}
.task-item.done .ti-check{background:var(--grn);border-color:var(--grn);
  box-shadow:0 0 8px rgba(74,222,128,.3);}
.task-item.done .ti-check::after{content:'';position:absolute;top:3px;left:6px;
  width:5px;height:9px;border-right:2px solid #141210;border-bottom:2px solid #141210;
  transform:rotate(45deg);}
.ti-lbl{font-size:13px;font-weight:500;color:var(--txt);flex:1;}
.ti-xp{font-size:11px;color:var(--txt3);font-weight:600;flex-shrink:0;
  font-family:'JetBrains Mono',monospace;}
.task-item.done .ti-xp{color:var(--grn);}

/* -- REWARDS -- */
.xp-balance{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;box-shadow:var(--shadow);}
.xb-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;}
.xb-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;
  color:var(--xp);margin-top:3px;text-shadow:0 0 12px rgba(13,148,136,.2);}
.xb-sub{font-size:10px;color:var(--txt3);margin-top:2px;}
.reward-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:13px;display:flex;align-items:center;gap:12px;margin-bottom:8px;
  transition:all .15s;box-shadow:var(--shadow);}
.reward-card.can{border-color:rgba(13,148,136,.3);background:var(--accent-dim2);}
.reward-icon{width:44px;height:44px;background:var(--panel2);border:1px solid var(--border);
  border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;}
.reward-info{flex:1;min-width:0;}
.reward-name{font-size:14px;font-weight:700;color:var(--txt);}
.reward-desc{font-size:11px;color:var(--txt3);margin-top:2px;}
.reward-cost{font-size:11px;color:var(--txt3);margin-top:4px;}
.reward-cost span{color:var(--xp);font-weight:700;font-family:'JetBrains Mono',monospace;}
.reward-btn{background:var(--panel2);border:1px solid var(--border);color:var(--txt3);
  font-family:'Sora',sans-serif;font-size:11px;font-weight:700;
  padding:9px 13px;cursor:pointer;border-radius:var(--radius-xs);flex-shrink:0;
  transition:all .15s;white-space:nowrap;}
.reward-btn.can{background:var(--accent);border-color:var(--accent);color:#141210;}
.reward-btn.can:hover{background:var(--accent2);}
.reward-btn:disabled{opacity:.3;cursor:not-allowed;}
.unlocked-item{background:var(--grn-dim);border:1px solid var(--grn-border);border-radius:var(--radius-xs);
  padding:9px 12px;display:flex;justify-content:space-between;align-items:center;
  margin-bottom:5px;font-size:12px;font-weight:600;color:var(--grn);}
.ul-date{font-size:10px;color:var(--grn);opacity:.5;font-family:'JetBrains Mono',monospace;}

/* -- REPORT -- */
.report-hero{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;text-align:center;margin-bottom:12px;box-shadow:var(--shadow);}
.rh-eyebrow{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:12px;}
.rh-score{font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:500;line-height:1;}
.rh-grade{font-size:12px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.6px;margin-top:7px;}
.rh-msg{font-size:13px;color:var(--txt2);margin-top:10px;line-height:1.7;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-cell-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:13px;text-align:center;box-shadow:var(--shadow);}
.stat-cell-lbl{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:5px;}
.stat-cell-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:var(--txt);}
.streak-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px;display:flex;align-items:center;gap:13px;margin-bottom:12px;box-shadow:var(--shadow);}
.streak-num{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:500;
  color:var(--xp);line-height:1;text-shadow:0 0 12px rgba(13,148,136,.25);}
.streak-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:3px;}
.streak-desc{font-size:12px;color:var(--txt2);}

/* -- TOAST / FLASH -- */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border);color:var(--txt);
  font-family:'Sora',sans-serif;font-size:12px;font-weight:600;
  padding:9px 18px;border-radius:20px;z-index:9995;opacity:0;pointer-events:none;
  transition:opacity .25s;white-space:nowrap;box-shadow:var(--shadow-md);}
.toast.show{opacity:1;}
.xp-flash{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);
  font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:500;color:var(--xp);
  pointer-events:none;z-index:9996;opacity:0;letter-spacing:2px;
  text-shadow:0 0 20px rgba(13,148,136,.5);}
.xp-flash.school-xp-flash{color:var(--cat-school);text-shadow:0 0 20px rgba(20,184,166,.5);}
.xp-flash.show{animation:xpfl .9s ease-out forwards;}
@keyframes xpfl{0%{opacity:1;transform:translate(-50%,-60%);}100%{opacity:0;transform:translate(-50%,-120%);}}
.time-flash{position:fixed;inset:0;background:rgba(248,113,113,.1);pointer-events:none;z-index:9994;opacity:0;}
.time-flash.show{animation:flashAnim .7s ease-out forwards;}
@keyframes flashAnim{0%{opacity:1;}100%{opacity:0;}}

/* -- PIN MODAL -- */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  z-index:9980;display:none;align-items:center;justify-content:center;}
.pin-overlay.show{display:flex;}
.pin-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:30px 24px;min-width:300px;text-align:center;box-shadow:var(--shadow-lg);}
.pin-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:4px;}
.pin-sub{font-size:12px;color:var(--txt3);margin-bottom:22px;}
.pin-dots{display:flex;gap:11px;justify-content:center;margin-bottom:22px;}
.pin-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--border);background:var(--bg);}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(13,148,136,.4);}
.pin-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pin-key{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius-xs);
  color:var(--txt);font-family:'Sora',sans-serif;font-size:20px;font-weight:700;
  padding:14px;cursor:pointer;transition:all .15s;}
.pin-key:hover{border-color:var(--accent);color:var(--accent);}
.pin-key:active{transform:scale(.95);}
.pin-key.clear{font-size:12px;color:var(--red);font-weight:700;}
.pin-key.cancel{font-size:12px;color:var(--txt3);font-weight:500;}
.pin-err{font-size:12px;color:var(--red);height:16px;margin-top:10px;font-weight:600;}

.tag{background:var(--xp);color:#141210;border-radius:8px;font-size:10px;padding:2px 8px;font-weight:700;font-family:'JetBrains Mono',monospace;}


/* -- PARENT DASHBOARD -- */
.parent-save-bar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--accent);
  padding:10px 14px;border-radius:var(--radius-sm);
  margin-bottom:12px;gap:10px;
}
.parent-save-hint{
  font-size:11px;font-weight:600;color:#fff;flex:1;text-align:center;opacity:.85;
}
.btn-save-confirm{
  background:#fff;color:var(--accent);border:none;
  font-family:"Sora",sans-serif;font-size:12px;font-weight:700;
  padding:8px 14px;border-radius:var(--radius-xs);cursor:pointer;
  white-space:nowrap;
}
.btn-save-confirm:active{opacity:.8;}
.btn-save-cancel{
  background:rgba(255,255,255,.2);color:#fff;border:none;
  font-family:"Sora",sans-serif;font-size:12px;font-weight:600;
  padding:8px 14px;border-radius:var(--radius-xs);cursor:pointer;
  white-space:nowrap;
}
.btn-save-cancel:active{opacity:.8;}
.parent-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--panel);
  border:1px solid var(--border);border-radius:var(--radius);padding:4px;}
.ptab{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:var(--radius-sm);
  font-family:'Sora',sans-serif;font-size:11px;font-weight:600;color:var(--txt3);
  cursor:pointer;transition:all .15s;letter-spacing:.1px;}
.ptab.active{background:var(--accent);color:#fff;}
.ptab:hover:not(.active){color:var(--txt2);background:var(--panel2);}
.ptab-content{display:none;}.ptab-content.active{display:block;}
.parent-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.parent-hint{font-size:11px;color:var(--txt3);font-weight:500;}
.btn-add{background:var(--accent-dim);border:1px solid rgba(13,148,136,.3);color:var(--accent);
  font-family:'Sora',sans-serif;font-size:12px;font-weight:700;padding:7px 14px;
  border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-add:hover{background:var(--accent);color:#fff;}

.editor-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.editor-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.editor-card-title{font-size:13px;font-weight:700;color:var(--txt);flex:1;}
.editor-card-del{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);
  border-radius:6px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Sora',sans-serif;}
.editor-card-del:hover{background:var(--red);color:#fff;}
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.editor-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1/-1;}
.field-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;}
.field-input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);
  padding:8px 10px;font-family:'Sora',sans-serif;font-size:13px;color:var(--txt);
  width:100%;outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--accent);}
.field-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);
  padding:8px 10px;font-family:'Sora',sans-serif;font-size:13px;color:var(--txt);
  width:100%;outline:none;appearance:none;}
.field-select:focus{border-color:var(--accent);}

.day-toggles{display:flex;gap:6px;flex-wrap:wrap;}
.day-toggle{padding:7px 12px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;
  color:var(--txt3);cursor:pointer;transition:all .15s;}
.day-toggle.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.setting-row{display:flex;align-items:center;gap:12px;padding:8px 0;
  border-bottom:1px solid var(--border2);}
.setting-row:last-child{border-bottom:none;}
.setting-lbl{font-size:13px;font-weight:600;color:var(--txt2);min-width:100px;}
.setting-input{flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-xs);padding:8px 10px;font-family:'Sora',sans-serif;
  font-size:13px;color:var(--txt);outline:none;}
.setting-input:focus{border-color:var(--accent);}

.subitems-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border2);}
.subitems-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.4px;margin-bottom:7px;}
.subitem-row{display:grid;grid-template-columns:1fr 80px 70px 28px;gap:6px;
  align-items:center;margin-bottom:6px;}
.subitem-del{background:transparent;border:none;color:var(--txt4);font-size:16px;
  cursor:pointer;padding:0;line-height:1;}
.subitem-del:hover{color:var(--red);}
.btn-add-sub{background:transparent;border:1px dashed var(--border);color:var(--txt3);
  font-family:'Sora',sans-serif;font-size:11px;font-weight:600;padding:6px 10px;
  border-radius:var(--radius-xs);cursor:pointer;width:100%;margin-top:6px;transition:all .15s;}
.btn-add-sub:hover{border-color:var(--accent);color:var(--accent);}

/* -- PARENT BTN -- */
.parent-btn{background:var(--panel2);border:1px solid var(--border);border-radius:20px;
  padding:5px 10px;cursor:pointer;font-size:13px;line-height:1;
  transition:all .2s;color:var(--txt2);flex-shrink:0;white-space:nowrap;}
.parent-btn:hover{border-color:var(--accent);transform:scale(1.05);}
.parent-btn:active{transform:scale(.95);}


/* -- TIMER WARNING STYLES -- */
@keyframes gentlePulse{
  0%,100%{transform:scale(1);box-shadow:var(--shadow);}
  50%{transform:scale(1.012);box-shadow:0 0 24px rgba(13,148,136,.2);}
}
@keyframes gentlePulseWarn{
  0%,100%{transform:scale(1);box-shadow:var(--shadow);}
  50%{transform:scale(1.015);box-shadow:0 0 28px rgba(240,165,0,.25);}
}
@keyframes gentlePulseEnd{
  0%,100%{transform:scale(1);box-shadow:var(--shadow);}
  50%{transform:scale(1.018);box-shadow:0 0 32px rgba(248,113,113,.3);}
}
.timer-pulse-warn{animation:gentlePulseWarn 2.5s ease-in-out infinite;}
.timer-pulse-end{animation:gentlePulseEnd 1.8s ease-in-out infinite;}

/* Screen tint overlay */
#warn-tint{
  position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:0;
  transition:opacity 3s ease;background:rgba(240,165,0,.06);
}
#warn-tint.warn-active{opacity:1;}
#warn-tint.end-active{background:rgba(248,113,113,.08);opacity:1;}
/* -- WARN OPTION BUTTONS -- */
.warn-opt-btn{
  background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;cursor:pointer;text-align:left;width:100%;
  font-family:"Sora",sans-serif;transition:all .15s;position:relative;
}
.warn-opt-btn:hover{border-color:var(--accent);}
.warn-opt-active{background:var(--accent-dim) !important;border-color:var(--accent) !important;}
.warn-opt-label{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:2px;}
.warn-opt-active .warn-opt-label{color:var(--accent);}
.warn-opt-desc{font-size:11px;color:var(--txt3);}

.warn-play-btn:active{opacity:.8;}
@keyframes warnPulsePreview{0%,100%{transform:scale(1);}50%{transform:scale(1.015);}}
.warn-preview-pulse{animation:warnPulsePreview 2.5s ease-in-out infinite;}

/* ── THEME: OPS ── */
[data-stack-theme="ops"]{
  --font-ui:'Exo 2',sans-serif;
  --font-head:'Exo 2',sans-serif;
  --radius:10px;
  --radius-sm:7px;
  --radius-xs:4px;
  --bg:#060a04;--bg2:#0d1a08;--panel:#0d1a08;--panel2:#122010;
  --border:#1a2e12;--border2:#142208;
  --txt:#c8e8c0;--txt2:#86c87a;--txt3:#5f9e52;--txt4:#2d5c22;
  --accent:#4ade80;--accent2:#22c55e;
  --xp:#4ade80;--xp2:#86efac;
  --xp-dim:rgba(74,222,128,.12);--xp-glow:rgba(74,222,128,.3);
  --accent-dim:rgba(74,222,128,.12);--accent-dim2:rgba(74,222,128,.07);
  --grn:#4ade80;--grn-dim:rgba(74,222,128,.09);--grn-border:rgba(74,222,128,.22);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,.09);--red-border:rgba(255,107,107,.22);
}
[data-stack-theme="ops"] .tb-title,
[data-stack-theme="ops"] .g-name,
[data-stack-theme="ops"] .g-eyebrow,
[data-stack-theme="ops"] .bc-timer,
[data-stack-theme="ops"] .sh-timer,
[data-stack-theme="ops"] .xp-val,
[data-stack-theme="ops"] .sxp-val,
[data-stack-theme="ops"] .rh-score,
[data-stack-theme="ops"] .streak-num{font-family:"Exo 2",sans-serif;font-weight:800;letter-spacing:.5px;}
[data-stack-theme="ops"] .tb-title{letter-spacing:2px;text-transform:uppercase;}
[data-stack-theme="ops"]{
  --cat-wake:#4ade80;
  --cat-school:#86efac;
